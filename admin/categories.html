<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>分类管理 — 管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
<div class="admin">
  <main class="admin-main">
    <div class="admin-content">
      <div class="page-header">
        <div><h1>分类管理</h1><div class="desc">管理产品分类，拖拽可调整顺序</div></div>
        <button id="add-btn" class="btn btn-primary">+ 新增分类</button>
      </div>

      <div style="overflow-x:auto">
        <table class="data">
          <thead>
            <tr><th style="width:40px">排序</th><th>分类名称</th><th>Slug</th><th>描述</th><th>产品数</th><th style="width:180px">操作</th></tr>
          </thead>
          <tbody id="cat-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="edit-modal" class="modal-mask">
  <div class="modal" style="max-width:520px">
    <div class="modal-head">
      <h3 id="edit-title">新增分类</h3>
      <button class="close" onclick="CatAdmin.close()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>分类名称 <span class="req">*</span></label>
        <input id="f-name" />
      </div>
      <div class="form-group">
        <label>Slug (URL标识，英文小写)</label>
        <input id="f-slug" />
        <div class="form-help">留空将自动生成</div>
      </div>
      <div class="form-group">
        <label>描述</label>
        <input id="f-desc" />
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="CatAdmin.close()">取消</button>
      <button class="btn btn-primary" onclick="CatAdmin.save()">保存</button>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
  if (!AdminLayout.requireAuth()) {}
  else {
    (async () => {
      await AdminLayout.init('categories');
      const S = window.NLStore;
      const CatAdmin = {
        editingId: null,

        async init(){
          document.getElementById('add-btn').addEventListener('click', () => this.open(null));
          await this.render();
        },

        async render(){
          const cats = await S.Categories.list();
          const products = await S.Products.list();
          const tbody = document.getElementById('cat-tbody');
          const catCount = {};
          products.forEach(p => { if (p.categoryId) catCount[p.categoryId] = (catCount[p.categoryId] || 0) + 1; });
          tbody.innerHTML = cats.map((c, i) => `
            <tr data-i="${i}">
              <td><span style="cursor:grab">☰</span></td>
              <td>${c.name}</td>
              <td style="color:var(--admin-muted)">/${c.slug}</td>
              <td>${c.description || ''}</td>
              <td>${catCount[c.id] || 0}</td>
              <td class="actions">
                <button class="btn btn-sm" onclick="CatAdmin.open('${c.id}')">编辑</button>
                <button class="btn btn-sm btn-danger" onclick="CatAdmin.remove('${c.id}')">删除</button>
              </td>
            </tr>
          `).join('');
          tbody.querySelectorAll('tr').forEach((tr) => {
            tr.draggable = true;
            tr.addEventListener('dragstart', () => tr.classList.add('dragging'));
            tr.addEventListener('dragend', async () => {
              tr.classList.remove('dragging');
              const items = Array.from(tbody.querySelectorAll('tr'));
              const newOrder = items.map(t => cats[+t.dataset.i].id);
              await S.Categories.reorder(newOrder);
              await this.render();
            });
            tr.addEventListener('dragover', (e) => e.preventDefault());
          });
        },

        async open(id){
          this.editingId = id;
          let c;
          if (id) c = await S.Categories.get(id);
          if (!c) c = { name:'', slug:'', description:'' };
          document.getElementById('edit-title').textContent = id ? '编辑分类' : '新增分类';
          document.getElementById('f-name').value = c.name || '';
          document.getElementById('f-slug').value = c.slug || '';
          document.getElementById('f-desc').value = c.description || '';
          document.getElementById('edit-modal').classList.add('show');
        },

        async save(){
          const name = document.getElementById('f-name').value.trim();
          let slug = document.getElementById('f-slug').value.trim();
          const description = document.getElementById('f-desc').value.trim();
          if (!name){ UI.toast('请输入分类名称','error'); return; }
          if (!slug) slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'-');

          try {
            if (this.editingId){
              await S.Categories.update(this.editingId, { name, slug, description });
              UI.toast('已更新','success');
            } else {
              await S.Categories.create({ name, slug, description });
              UI.toast('已创建','success');
            }
            this.close();
            await this.render();
          } catch(err){
            UI.toast('保存失败: ' + (err.message || ''), 'error');
          }
        },

        close(){ document.getElementById('edit-modal').classList.remove('show'); },

        remove(id){
          UI.confirm('删除分类将同时删除其下所有产品，确定？', async () => {
            try {
              await S.Categories.remove(id);
              UI.toast('已删除','success');
              await this.render();
            } catch(err){
              UI.toast('删除失败', 'error');
            }
          });
        }
      };
      window.CatAdmin = CatAdmin;
      await CatAdmin.init();
    })();
  }
</script>
</body>
</html>
