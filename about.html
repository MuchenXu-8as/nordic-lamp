<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>About —</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="about">
<header id="site-header"></header>

<section class="about-hero">
  <div class="container about-content">
    <div class="image-block">
      <img id="about-image" src="https://images.unsplash.com/photo-1540932239986-30128078f3c5?w=900&q=80" alt="About" />
    </div>
    <div class="text-block">
      <p class="eyebrow">Our Story</p>
      <h2 data-text="about.title">Quiet objects, considered lives.</h2>
      <p id="about-intro"></p>
      <div id="about-body" style="margin-top:24px;white-space:pre-line"></div>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/js/api.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    I18n.init();
    await Site.renderHeader();
    await Site.renderFooter();
    await Site.applySiteSettings();
    await AboutPage.init();
  });
</script>
</body>
</html>
